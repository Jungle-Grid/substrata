name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @substrata/db exec prisma generate --schema prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/substrata_ci?schema=public
      - run: python3 -m unittest discover -s workers/classifier/tests -v
      - run: pnpm test:production-env
      - run: pnpm lint
      - run: pnpm typecheck
      - run: WEB_APP_URL=http://localhost:3000 pnpm --filter @substrata/api test
      - run: pnpm --filter @substrata/api exec tsx --test ../../apps/web/src/lib/candidate-groups.test.ts
      - run: pnpm build
