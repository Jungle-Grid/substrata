name: substrata

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-substrata}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - substrata-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: infra/Dockerfile
      target: api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-substrata}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "--filter", "@substrata/db", "exec", "prisma", "migrate", "deploy", "--schema", "prisma/schema.prisma"]
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: infra/Dockerfile
      target: api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-substrata}?schema=public
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["pnpm", "--filter", "@substrata/db", "exec", "tsx", "prisma/seed.ts"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
      target: api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-substrata}?schema=public
      API_PORT: 4000
      API_URL: ${API_URL:-http://localhost:4000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:3000}
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-local-demo-only-replace-before-any-shared-deployment}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-substrata_session}
      EMAIL_PROVIDER: console
      LOCAL_STORAGE_ROOT: /app/tmp/storage
      AI_FALLBACK_TO_HEURISTIC: "true"
      LOCAL_GEMMA_ENABLED: "false"
      FIREWORKS_ENABLED: "false"
      JUNGLEGRID_ENABLED: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - substrata-storage:/app/tmp/storage
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30

  web:
    build:
      context: .
      dockerfile: infra/Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  substrata-postgres-data:
  substrata-storage:
