name: Publish Jungle Grid Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/jungle-grid-image.yml'
      - 'infra/jungle-grid-image/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/dejaguarkyng/substrata-jungle-grid-inference

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: infra/jungle-grid-image
          file: infra/jungle-grid-image/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
